<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cravings Delight - Launching Soon</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }
      .logo {
        font-size: 4rem;
        margin-bottom: 1rem;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      }
      .subtitle {
        font-size: 1.2rem;
        margin-bottom: 3rem;
        opacity: 0.9;
      }
      .countdown {
        display: flex;
        justify-content: center;
        gap: 2rem;
        margin-bottom: 3rem;
      }
      .time-box {
        background: rgba(255, 255, 255, 0.2);
        padding: 1.5rem;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        min-width: 100px;
      }
      .time-value {
        font-size: 3rem;
        font-weight: bold;
        display: block;
      }
      .time-label {
        font-size: 0.9rem;
        opacity: 0.8;
        text-transform: uppercase;
        margin-top: 0.5rem;
      }
      .message {
        font-size: 1.1rem;
        opacity: 0.9;
        line-height: 1.6;
      }
      @media (max-width: 600px) {
        .countdown {
          gap: 1rem;
        }
        .time-box {
          padding: 1rem;
          min-width: 70px;
        }
        .time-value {
          font-size: 2rem;
        }
        h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🍽️</div>
      <h1>Cravings Delight</h1>
      <p class="subtitle">Something Amazing is Coming!</p>
      
      <div class="countdown">
        <div class="time-box">
          <span class="time-value" id="days">00</span>
          <span class="time-label">Days</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="hours">00</span>
          <span class="time-label">Hours</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="minutes">00</span>
          <span class="time-label">Minutes</span>
        </div>
        <div class="time-box">
          <span class="time-value" id="seconds">00</span>
          <span class="time-label">Seconds</span>
        </div>
      </div>
      
      <p class="message">
        We're preparing an incredible experience for you.<br>
        Authentic African cuisine coming to Hull on April 1st, 2026!
      </p>
    </div>

    <script>
      // Countdown to April 1st, 2026
      const launchDate = new Date('April 1, 2026 00:00:00').getTime();

      function updateCountdown() {
        const now = new Date().getTime();
        const distance = launchDate - now;

        if (distance < 0) {
          // Launch date reached - show full site
          document.body.innerHTML = '<div id="root"></div>';
          const script = document.createElement('script');
          script.type = 'module';
          script.src = '/src/main.tsx';
          document.body.appendChild(script);
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById('days').textContent = String(days).padStart(2, '0');
        document.getElementById('hours').textContent = String(hours).padStart(2, '0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
        document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
      }

      // Update countdown every second
      updateCountdown();
      setInterval(updateCountdown, 1000);
    </script>
  </body>
</html>
