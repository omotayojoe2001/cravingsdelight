<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Site Unavailable</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #333;
      }
      .container {
        text-align: center;
        padding: 2rem;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        max-width: 400px;
      }
      h1 {
        font-size: 4rem;
        margin: 0;
        color: #e74c3c;
      }
      h2 {
        font-size: 1.5rem;
        margin: 1rem 0;
        color: #333;
      }
      p {
        font-size: 1rem;
        color: #666;
        margin: 1rem 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Site Unavailable</h2>
      <p>This site is temporarily unavailable.</p>
      <p>Please check back later.</p>
    </div>
  </body>
</html>
